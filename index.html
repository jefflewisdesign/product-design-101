<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Product Design 101</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0c14;
    --surface: #14141f;
    --card: #1a1a2e;
    --accent: #ff6b35;
    --text: #f0eff5;
    --muted: #8b8a9b;
    --border: rgba(255,255,255,0.07);
  }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .app {
    width: 100%;
    max-width: 420px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 108px 24px 32px;
    position: relative;
  }

  .header {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 28px 24px 0;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 1px;
  }

  .header-eyebrow {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .header-title {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.1;
  }

  .header-title em { font-style: normal; color: var(--accent); }

  .header-sub {
    font-size: 11.5px;
    color: var(--muted);
    font-weight: 300;
    line-height: 1.5;
    margin-top: 4px;
    max-width: 280px;
  }

  /* Progress */
  .progress-wrap { width: 100%; margin-bottom: 22px; }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    margin-bottom: 7px;
    font-size: 11px;
    color: var(--muted);
  }

  .progress-meta strong {
    font-size: 11px;
    font-weight: 400;
    color: var(--muted);
  }

  .bar-track {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #a855f7);
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  /* Card — fixed height */
  .card-wrapper { width: 100%; }

  .card {
    width: 100%;
    height: 380px; /* fixed — sized to tallest content */
    background: var(--card);
    border-radius: 24px;
    border: 1px solid var(--border);
    padding: 32px 28px 28px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--glow, rgba(255,107,53,0.1)) 0%, transparent 70%);
    pointer-events: none;
  }

  .card.exit-left  { animation: exitL  .26s ease forwards; }
  .card.exit-right { animation: exitR  .26s ease forwards; }
  .card.enter-right { animation: enterR .32s cubic-bezier(.34,1.56,.64,1) forwards; }
  .card.enter-left  { animation: enterL .32s cubic-bezier(.34,1.56,.64,1) forwards; }

  @keyframes exitL  { to { transform: translateX(-70px) scale(.92); opacity: 0; } }
  @keyframes exitR  { to { transform: translateX( 70px) scale(.92); opacity: 0; } }
  @keyframes enterR { from { transform: translateX( 70px) scale(.92); opacity: 0; } to { transform: none; opacity: 1; } }
  @keyframes enterL { from { transform: translateX(-70px) scale(.92); opacity: 0; } to { transform: none; opacity: 1; } }

  /* Card inner layout */
  .card-body {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .icon-ring {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    flex-shrink: 0;
    margin-bottom: 18px;
  }

  .concept-name {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    line-height: 1.15;
    margin-bottom: 10px;
    letter-spacing: -0.02em;
    flex-shrink: 0;
  }

  .concept-desc {
    font-size: 13.5px;
    line-height: 1.72;
    color: var(--muted);
    font-weight: 300;
    flex: 1;
  }

  .concept-desc strong {
    color: rgba(240,239,245,0.82);
    font-weight: 500;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 16px;
    padding: 4px 11px;
    border-radius: 99px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    flex-shrink: 0;
    align-self: flex-start;
  }

  .tag-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Follow card */
  .follow-body {
    display: flex;
    flex-direction: column;
    height: 100%;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 0;
  }

  .follow-body .icon-ring { margin: 0 auto 16px; }
  .follow-body .concept-name { margin-bottom: 8px; }
  .follow-body .concept-desc { flex: none; }

  .social-links {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 18px;
    width: 100%;
  }

  .social-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 14px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.04);
    color: var(--text);
    text-decoration: none;
    transition: background 0.18s;
    -webkit-tap-highlight-color: transparent;
  }

  .social-btn:active { background: rgba(255,255,255,0.08); }

  .social-ico {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .social-info { display: flex; flex-direction: column; gap: 1px; flex: 1; text-align: left; }
  .social-info strong { font-size: 13px; font-weight: 600; }
  .social-info span { font-size: 11px; color: var(--muted); }
  .social-arrow { color: var(--muted); font-size: 13px; }

  /* Nav */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    margin-top: 18px;
  }

  .nav-btn {
    width: 52px; height: 52px;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform .15s, background .15s;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }

  .nav-btn:active { transform: scale(.9); }
  .nav-btn:disabled { opacity: .22; pointer-events: none; }

  .nav-btn.fwd {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 6px 20px rgba(255,107,53,.28);
  }

  .nav-btn.fwd:active { background: #d95c28; }

  .nav-label {
    flex: 1;
    text-align: center;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-eyebrow">Beginner's Guide</div>
    <div class="header-title">Product<br>Design <em>101</em></div>
    <div class="header-sub">12 concepts every designer should know — from fundamentals to the AI era.</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="remainLabel"></span>
      <strong id="fracLabel"></strong>
    </div>
    <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
  </div>

  <div class="card-wrapper">
    <div class="card" id="card">
      <div id="cardInner"></div>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn" id="prevBtn" onclick="go(-1)">&#8592;</button>
    <button class="nav-btn fwd" id="nextBtn" onclick="go(1)">&#8594;</button>
  </nav>

</div>

    tag: "Strategy",
    icon: "🎯",
    color: "#ff6b35",
    glow: "rgba(255,107,53,.13)"
  },
  {
    name: "Systems Over Screens",
    desc: "Modern product design isn't about crafting perfect individual screens — it's about building <strong>coherent systems</strong>. Every component, pattern, and interaction should feel like it belongs to the same organism. Think in tokens, not one-offs.",
    tag: "Design Systems",
    icon: "🧩",
    color: "#a855f7",
    glow: "rgba(168,85,247,.13)"
  },
  {
    name: "Progressive Disclosure",
    desc: "Show people what they need, when they need it. <strong>Complexity shouldn't disappear — it should be earned.</strong> AI products especially fail here: dumping every capability upfront is how you get a product that feels overwhelming before it feels useful.",
    tag: "Interaction",
    icon: "🪄",
    color: "#06b6d4",
    glow: "rgba(6,182,212,.13)"
  },
  {
    name: "Mental Models",
    desc: "Users don't come to your product blank — they bring <strong>preloaded expectations</strong> from every app they've ever used. Your job is to meet those models or deliberately break them with something better. Fighting them silently is how you create confusion.",
    tag: "Cognition",
    icon: "🧠",
    color: "#f59e0b",
    glow: "rgba(245,158,11,.13)"
  },
  {
    name: "Hierarchy is Prioritization",
    desc: "Visual hierarchy isn't a design skill — it's a <strong>product decision made visible</strong>. What's biggest, boldest, and first on screen reflects what your team believes matters most. If everything is emphasized, nothing is. Own the tradeoffs.",
    tag: "Visual Design",
    icon: "📐",
    color: "#ec4899",
    glow: "rgba(236,72,153,.13)"
  },
  {
    name: "Affordances in the AI Era",
    desc: "When interfaces become conversational, the old affordance playbook breaks down. <strong>How do you signal capability to a blank input?</strong> The best AI products use examples, scaffolding, and progressive prompting — not just a cursor and a placeholder.",
    tag: "AI & Interaction",
    icon: "🤖",
    color: "#10b981",
    glow: "rgba(16,185,129,.13)"
  },
  {
    name: "Error States are UX",
    desc: "Empty states, error messages, and loading screens are <strong>not edge cases — they're the product</strong>. For many users, a broken flow is their first impression. Treat every failure state with the same design rigor as your core happy path.",
    tag: "Craft",
    icon: "⚠️",
    color: "#f97316",
    glow: "rgba(249,115,22,.13)"
  },
  {
    name: "Accessibility = Better Design",
    desc: "Color contrast, touch targets, readable type, and keyboard nav don't just serve disabled users — they make <strong>every experience sharper</strong>. A11y constraints force clarity. Treat WCAG as a quality bar, not a compliance checklist.",
    tag: "Inclusion",
    icon: "♿",
    color: "#22c55e",
    glow: "rgba(34,197,94,.13)"
  },
  {
    name: "Friction Isn't Always Bad",
    desc: "The reflex to 'reduce friction' is overused. Some friction builds <strong>trust, comprehension, and commitment</strong>. Deleting a workspace, publishing to production, or making a purchase — a well-placed pause prevents regret. Intentional friction is a feature.",
    tag: "Psychology",
    icon: "⚡",
    color: "#f43f5e",
    glow: "rgba(244,63,94,.13)"
  },
  {
    name: "Design Debt is Real Debt",
    desc: "Inconsistent components, one-off patterns, and 'we'll fix it later' UX decisions compound — fast. <strong>Design debt slows engineering, confuses users, and fractures brand trust.</strong> The best designers advocate for cleanup work the way engineers advocate for refactors.",
    tag: "Systems",
    icon: "💳",
    color: "#8b5cf6",
    glow: "rgba(139,92,246,.13)"
  },
  {
    name: "Prototype to Think",
    desc: "Prototypes aren't for stakeholder presentations — they're for <strong>resolving ambiguity in your own head</strong>. The act of building a flow, even roughly, surfaces decisions that no amount of meeting discussion will. Make something interactive before you make it perfect.",
    tag: "Process",
    icon: "✏️",
    color: "#14b8a6",
    glow: "rgba(20,184,166,.13)"
  },
  {
    name: "Typography is Voice",
    desc: "Type is the first thing that tells a user what kind of product they're in. <strong>Size, weight, spacing, and typescale</strong> set tone before a single word is read. In a world where AI-generated interfaces are proliferating, sharp typography is one of the last differentiators of craft.",
    tag: "Visual Design",
    icon: "🔤",
    color: "#6366f1",
    glow: "rgba(99,102,241,.13)"
  },
  { isFollow: true }

let cur = 0, busy = false;

  return `<div class="card-body">

    <div class="concept-name">${c.name}</div>
    <div class="concept-desc">${c.desc}</div>
    <div class="tag"><div class="tag-dot" style="background:${c.color}"></div>${c.tag}</div>
  </div>`;
}

function render() {
  const c = cards[cur];
  const card = document.getElementById('card');

  if (c.isFollow) {
    card.style.setProperty('--glow','rgba(255,107,53,.1)');
    document.getElementById('cardInner').innerHTML = buildFollow();
  } else {
    card.style.setProperty('--glow', c.glow);
    document.getElementById('cardInner').innerHTML = buildNormal(c);
  }

  const pct = ((cur + 1) / N) * 100;
  document.getElementById('barFill').style.width = pct + '%';
  document.getElementById('fracLabel').textContent = `${cur + 1} / ${N}`;
  const rem = N - cur - 1;
  document.getElementById('remainLabel').textContent = rem === 0 ? '🎉 Done!' : `${rem} card${rem !== 1 ? 's' : ''} left`;

  document.getElementById('prevBtn').disabled = cur === 0;
  const nb = document.getElementById('nextBtn');
  if (cur === N - 1) { nb.textContent = '✓'; nb.disabled = true; }
  else { nb.innerHTML = '&#8594;'; nb.disabled = false; }
}

function go(dir) {
  if (busy) return;
  const nxt = cur + dir;
  if (nxt < 0 || nxt >= N) return;
  busy = true;
  const card = document.getElementById('card');
  card.classList.add(dir > 0 ? 'exit-left' : 'exit-right');
  setTimeout(() => {
    card.classList.remove('exit-left','exit-right');
    cur = nxt; render();
    card.classList.add(dir > 0 ? 'enter-right' : 'enter-left');
    setTimeout(() => { card.classList.remove('enter-right','enter-left'); busy = false; }, 350);
  }, 240);
}

let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 50) go(dx < 0 ? 1 : -1);
}, { passive: true });

render();
</script>
